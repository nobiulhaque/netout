<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    <!-- Titlebar (Draggable) -->
    <header class="titlebar">
      <div class="titlebar-logo">
        <img src="icon.png" width="18" height="18" style="border-radius: 4px; object-fit: cover;">
        <span>NetOut</span>
      </div>
      <div class="titlebar-controls">
        <button id="btn-minimize" title="Minimize" class="control-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="btn-close" title="Close" class="control-btn close-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="content">
      
      <!-- Admin Rights Status Card -->
      <div id="admin-badge" class="admin-badge admin-checking">
        <div class="admin-badge-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </div>
        <div class="admin-badge-text" id="admin-badge-text">Checking permissions...</div>
      </div>

      <!-- Master Power Control -->
      <section class="master-control-section">
        <div class="master-outer-glow" id="master-glow-container">
          <button id="btn-master-toggle" class="master-toggle-btn">
            <div class="power-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                <line x1="12" y1="2" x2="12" y2="12"></line>
              </svg>
            </div>
          </button>
        </div>
        <div class="master-status-label" id="master-status-label">Internet is Active</div>
        <div class="master-status-sub" id="master-status-sub">All adapters online</div>
      </section>

      <!-- Network Adapters List -->
      <section class="section adapters-section">
        <div class="section-header">
          <h2>Network Adapters</h2>
          <span class="refresh-indicator" id="refresh-indicator">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
            </svg>
          </span>
        </div>
        <div class="adapters-list" id="adapters-list">
          <!-- Populated dynamically by renderer.js -->
          <div class="adapter-skeleton">
            <div class="skeleton-text short"></div>
            <div class="skeleton-text long"></div>
          </div>
        </div>
      </section>

      <!-- Keyboard Shortcut Recorder -->
      <section class="section shortcut-section">
        <div class="section-header">
          <h2>Global Hotkey</h2>
        </div>
        <div class="shortcut-container">
          <div class="shortcut-input-wrapper">
            <span class="shortcut-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                <line x1="6" y1="8" x2="6.01" y2="8"></line>
                <line x1="10" y1="8" x2="10.01" y2="8"></line>
                <line x1="14" y1="8" x2="14.01" y2="8"></line>
                <line x1="18" y1="8" x2="18.01" y2="8"></line>
                <line x1="6" y1="12" x2="6.01" y2="12"></line>
                <line x1="18" y1="12" x2="18.01" y2="12"></line>
                <line x1="7" y1="16" x2="17" y2="16"></line>
              </svg>
            </span>
            <input type="text" id="shortcut-display" class="shortcut-display" value="Press keys to bind..." readonly>
          </div>
          <button id="btn-clear-shortcut" class="action-btn" title="Clear shortcut">Clear</button>
        </div>
        <div class="hint-text">Trigger toggles even when minimized or in background.</div>
      </section>

      <!-- Application Settings -->
      <section class="section settings-section">
        <div class="section-header">
          <h2>Settings</h2>
        </div>
        <div class="settings-grid">
          <label class="setting-item">
            <span class="setting-label">Run on Windows startup</span>
            <input type="checkbox" id="chk-startup" class="switch-checkbox">
            <span class="switch-slider"></span>
          </label>
          
          <label class="setting-item">
            <span class="setting-label">Start minimized</span>
            <input type="checkbox" id="chk-start-minimized" class="switch-checkbox">
            <span class="switch-slider"></span>
          </label>

          <label class="setting-item">
            <span class="setting-label">Minimize to System Tray</span>
            <input type="checkbox" id="chk-tray" class="switch-checkbox">
            <span class="switch-slider"></span>
          </label>

        </div>
      </section>

    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
